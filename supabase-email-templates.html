<!--
PurePep Labs — Supabase Auth email templates

Logo is referenced as a remote URL because Gmail strips data: URIs from
<img> tags. The image is hosted at thepurepep.com (excluded from the
site lock by the proxy matcher so it stays fetchable).

Push to Supabase via:
  node --env-file=.env.local scripts/push-supabase-templates.mjs
-->

<template name="confirm-signup" subject="Confirm your PurePep Labs account">
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
  </head>
  <body style="margin:0;padding:0;background:#0a0d12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#f4f6f9;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;visibility:hidden;">Confirm your email to finish opening your PurePep Labs research account.</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0d12;">
      <tr><td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">
          <tr><td align="center" style="padding:0 0 32px 0;"><img src="https://thepurepep.com/images/PurePep_Label_email.png" alt="PurePep Labs" width="80" height="82" style="display:block;width:80px;height:auto;border:0;outline:none;text-decoration:none;"></td></tr>
          <tr><td>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0e131a;border:1px solid rgba(255,255,255,0.08);border-radius:6px;">
              <tr><td style="padding:36px 32px 32px 32px;">
                <div style="height:2px;width:48px;background:linear-gradient(90deg,#4763d9,#4dd2e8);margin:0 0 24px 0;line-height:2px;font-size:0;">&nbsp;</div>
                <div style="font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#98a0ad;margin:0 0 12px 0;">§ 01 · Confirm account</div>
                <h1 style="margin:0 0 20px 0;font-family:Georgia,'Times New Roman',serif;font-size:30px;line-height:1.1;letter-spacing:-0.01em;color:#f4f6f9;font-weight:600;">Confirm your email.</h1>
                <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#c4cad3;">You&rsquo;re a click away from your PurePep Labs research account. Confirm the email below to verify the address and enable inventory access, Certificates of Analysis, and order history.</p>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px 0;">
                  <tr><td style="background:#4dd2e8;border-radius:2px;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#0a0d12;text-decoration:none;font-weight:600;">Confirm email →</a>
                  </td></tr>
                </table>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#7d8593;">If the button doesn&rsquo;t open, paste this into your browser:<br><span style="color:#98a0ad;word-break:break-all;">{{ .ConfirmationURL }}</span></p>
              </td></tr>
            </table>
          </td></tr>
          <tr><td style="padding:24px 8px 0 8px;">
            <p style="margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:#7d8593;line-height:1.7;text-align:center;">
              PurePep Labs &middot; Houston, TX<br>
              <span style="color:#5e6571;">For laboratory research use only &middot; Not for human consumption</span>
            </p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
</template>
